services:
  app:
    build: .
    container_name: maragobus_dev
    ports:
      - "8081:8081"   # Metro bundler
      - "19000:19000" # Expo Go
      - "19001:19001" # Expo DevTools
      - "19002:19002" # Expo DevTools
    volumes:
      # Monta o código fonte — edições locais refletem instantaneamente
      - .:/app
      # Volumes nomeados preservam o node_modules do container,
      # evitando conflitos com o node_modules da máquina host
      - app_node_modules:/app/node_modules
      - functions_node_modules:/app/functions/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      # IP LAN da máquina host — permite que dispositivos físicos escaneiem o QR code.
      # Altere para o IP da máquina onde o Docker está rodando:
      #   Linux/Mac:  ip route get 1.1.1.1 | awk '{print $7; exit}'
      #   Windows:    ipconfig | findstr "IPv4"
      - REACT_NATIVE_PACKAGER_HOSTNAME=${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
    stdin_open: true
    tty: true

volumes:
  app_node_modules:
  functions_node_modules:
